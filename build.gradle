plugins {
    id 'application'
}

java {
    sourceCompatibility = JavaVersion.VERSION_17
    targetCompatibility = JavaVersion.VERSION_17
}

sourceSets {
    main {
        java {
            srcDirs = ['javaprj/javaprj/src']
        }
        resources {
            srcDirs = ['javaprj/javaprj/src']
            exclude '**/*.java', '**/*.class'
        }
    }
}

application {
    mainClass = 'swing_version.GameMain'
}

tasks.withType(JavaCompile).configureEach {
    options.encoding = 'UTF-8'
}

tasks.withType(JavaExec).configureEach {
    workingDir = layout.projectDirectory.dir('javaprj/javaprj').asFile
}
